<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suppliers | Supply Chain Transparency Platform</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="topnav">
    <div class="brand"><span class="dot"></span> Supply Chain Transparency</div>
    <nav>
      <a href="index.html">Dashboard</a>
      <a href="products.html">Products</a>
      <a href="suppliers.html" class="active">Suppliers</a>
      <a href="track.html">Track Shipment</a>
      <a href="verify.html">Verify Product</a>
    </nav>
  </header>

  <main class="page">
    <div class="page-header">
      <h1>Suppliers</h1>
      <p>Onboard suppliers so their products can be registered against them.</p>
    </div>

    <div class="grid grid-2">
      <div class="card">
        <h2>Add a supplier</h2>
        <div id="formNotice"></div>
        <form id="supplierForm">
          <label for="supplierId">Supplier ID</label>
          <input type="text" id="supplierId" placeholder="SUP-001" required>

          <label for="supplierName">Supplier name</label>
          <input type="text" id="supplierName" placeholder="GreenLeaf Organics" required>

          <div class="form-row">
            <div>
              <label for="email">Email</label>
              <input type="email" id="email" placeholder="contact@example.com" required>
            </div>
            <div>
              <label for="phone">Phone</label>
              <input type="tel" id="phone" placeholder="9990001111" required>
            </div>
          </div>

          <label for="supplierType">Supplier type</label>
          <select id="supplierType" required>
            <option value="Manufacturer">Manufacturer</option>
            <option value="Distributor">Distributor</option>
            <option value="Logistics">Logistics Partner</option>
          </select>

          <label for="address">Address</label>
          <textarea id="address" rows="2" placeholder="12 Farm Road, Anantapur, IN" required></textarea>

          <button type="submit" class="btn btn-primary btn-block">Add supplier</button>
        </form>
      </div>

      <div class="card">
        <h2>All suppliers</h2>
        <div id="supplierList"><p class="empty-state">Loading…</p></div>
      </div>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/suppliers.js"></script>
</body>
</html>
